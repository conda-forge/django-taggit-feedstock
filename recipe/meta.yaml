{% set version = "6.1.0" %}

package:
  name: django-taggit
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/django-taggit/django_taggit-{{ version }}.tar.gz
  sha256: c4d1199e6df34125dd36db5eb0efe545b254dec3980ce5dd80e6bab3e78757c3

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - django >=1.11

test:
  imports:
    - taggit
    - taggit.migrations
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: http://github.com/alex/django-taggit/tree/master
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: django-taggit is a reusable Django application for simple tagging.

extra:
  recipe-maintainers:
    - kwilcox
    - marcelotrevisani
